      #     app-name: "ten-app-service-cua-ban"
      #     publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      #     images: "${{ secrets.ACR_LOGIN_SERVER }}/nextjs-app:${{ github.sha }}"
