name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build . -t ${{ secrets.ACR_LOGIN_SERVER }}/nextjs-app:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/nextjs-app:latest --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.MY_BE_API_URL }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/nextjs-app:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/nextjs-app:latest

      # - name: Deploy to Azure Web App
